name: "Evidence Gate Action"
description: "Fail-closed quality gates for CI/CD. 25 gate types, tamper-proof evidence chains, Blind Gate anti-gaming. Free for OSS."
author: "evidence-gate"

branding:
  icon: shield
  color: blue

inputs:
  api_key:
    description: >-
      Evidence Gate API key. Optional — omit for Free mode (client-side
      evaluation only). Required for Pro/Enterprise features (Blind Gate,
      Quality State, Remediation).
    required: false
    default: ""
  gate_type:
    description: "Gate type to evaluate (e.g., skill, xac, security)"
    required: true
  phase_id:
    description: "Phase ID (e.g., 1a, 2b)"
    required: true
  evidence_files:
    description: "Comma-separated list of evidence file paths"
    required: false
    default: ""
  api_base:
    description: "Evidence Gate API base URL (change for Self-hosted Enterprise)"
    required: false
    default: "https://api.evidence-gate.dev"
  dashboard_base_url:
    description: "Supplemental dashboard base URL for run/evidence deep links"
    required: false
    default: ""
  evidence_url:
    description: "Explicit evidence deep link URL"
    required: false
    default: ""
  mode:
    description: "Execution mode: 'enforce' (default, fail on gate failure) or 'observe' (log results without blocking)"
    required: false
    default: "enforce"
  debug:
    description: "Enable verbose diagnostic output"
    required: false
    default: "false"
  version:
    description: "Evaluator version to install (set specific version to pip install evidence-gate-evaluator==X.Y.Z, or 'latest' for stdlib-only)"
    required: false
    default: "latest"

outputs:
  passed:
    description: "Gate result (true/false)"
    value: ${{ steps.evidence_gate.outputs.passed }}
  run_id:
    description: "Pipeline run ID"
    value: ${{ steps.evidence_gate.outputs.run_id }}
  trace_url:
    description: "Langfuse trace URL"
    value: ${{ steps.evidence_gate.outputs.trace_url }}
  evidence_url:
    description: "Evidence detail URL"
    value: ${{ steps.evidence_gate.outputs.evidence_url }}
  dashboard_url:
    description: "Supplemental dashboard URL"
    value: ${{ steps.evidence_gate.outputs.dashboard_url }}
  github_run_url:
    description: "GitHub Actions run URL"
    value: ${{ steps.evidence_gate.outputs.github_run_url }}
  major_issue_count:
    description: "Number of detected issues"
    value: ${{ steps.evidence_gate.outputs.major_issue_count }}
  mode:
    description: "Detected operational mode: free, pro, or enterprise"
    value: ${{ steps.evidence_gate.outputs.mode }}
  observe_would_pass:
    description: "In observe mode, whether the gate would have passed (true/false). Only set when mode input is 'observe'."
    value: ${{ steps.evidence_gate.outputs.observe_would_pass }}
  missing_evidence:
    description: "JSON array of missing evidence items [{code, message, field_path}]"
    value: ${{ steps.evidence_gate.outputs.missing_evidence }}
  json_output:
    description: "Full evaluation result as JSON string (use fromJson() to parse)"
    value: ${{ steps.evidence_gate.outputs.json_output }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Cache pip packages
      if: inputs.version != 'latest' && inputs.version != ''
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-eg-${{ inputs.version }}
        restore-keys: |
          ${{ runner.os }}-pip-eg-

    - name: Install evaluator
      if: inputs.version != 'latest' && inputs.version != ''
      shell: bash
      run: pip install evidence-gate-evaluator==${{ inputs.version }}

    - name: Run Evidence Gate
      id: evidence_gate
      shell: bash
      env:
        EG_API_KEY: ${{ inputs.api_key }}
        EG_API_BASE: ${{ inputs.api_base }}
        EG_MODE: ${{ inputs.mode }}
        EG_GATE_TYPE: ${{ inputs.gate_type }}
        EG_PHASE_ID: ${{ inputs.phase_id }}
        EG_EVIDENCE_FILES: ${{ inputs.evidence_files }}
        EG_DASHBOARD_BASE_URL: ${{ inputs.dashboard_base_url }}
        EG_EVIDENCE_URL: ${{ inputs.evidence_url }}
        EG_RUN_ID: ${{ github.run_id }}
        EG_DEBUG: ${{ inputs.debug }}
        EG_VERSION: ${{ inputs.version }}
      run: python ${{ github.action_path }}/src/entrypoint.py
